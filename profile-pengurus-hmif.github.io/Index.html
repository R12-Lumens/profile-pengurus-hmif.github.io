<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <title>Profil Anggota HMIF — ID Card (Landscape)</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap');

    :root {
      --navy: #081226;
      --blue-deep: #0B3D91;
      --blue: #1666C2;
      --cyan: #4FC3F7;
      --yellow: #FFD23F;
      --black: #05070C;
      --white: #F4F8FC;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
      background: var(--black);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      overflow: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 20% 15%, rgba(79, 195, 247, 0.12), transparent 40%),
        radial-gradient(circle at 85% 80%, rgba(255, 210, 63, 0.08), transparent 45%),
        var(--black);
      z-index: 0;
    }

    .stage {
      position: relative;
      width: 1280px;
      height: 720px;
      border-radius: 32px;
      overflow: hidden;
      background: linear-gradient(165deg, var(--navy) 0%, var(--blue-deep) 55%, var(--navy) 100%);
      box-shadow: 0 0 0 1px rgba(79, 195, 247, 0.25), 0 40px 80px -20px rgba(0, 0, 0, 0.8), 0 0 60px rgba(22, 102, 194, 0.25);
      z-index: 1;
    }

    .stage::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(79, 195, 247, 0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(79, 195, 247, 0.06) 1px, transparent 1px);
      background-size: 28px 28px;
      mask-image: radial-gradient(circle at 50% 40%, black 20%, transparent 75%);
      pointer-events: none;
    }

    .binary-rain {
      position: absolute;
      inset: 0;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: rgba(79, 195, 247, 0.10);
      line-height: 1.5;
      letter-spacing: 2px;
      padding: 10px;
      white-space: pre-wrap;
      pointer-events: none;
      user-select: none;
    }

    .topbar {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 34px 56px 0;
      z-index: 2;
    }

    .org-mark {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .org-mark .glyph {
      width: 34px;
      height: 34px;
      border-radius: 9px;
      background: linear-gradient(145deg, var(--cyan), var(--blue));
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      color: var(--black);
      font-size: 14px;
      box-shadow: 0 0 16px rgba(79, 195, 247, 0.5);
    }

    .org-mark .txt {
      font-family: 'Sora', sans-serif;
      font-size: 12.5px;
      font-weight: 700;
      letter-spacing: 0.14em;
      color: var(--white);
      line-height: 1.2;
    }

    .org-mark .txt span {
      display: block;
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      font-size: 9px;
      letter-spacing: 0.12em;
      color: var(--cyan);
      opacity: 0.8;
      margin-top: 2px;
    }

    .index-tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--yellow);
      background: rgba(255, 210, 63, 0.08);
      border: 1px solid rgba(255, 210, 63, 0.35);
      padding: 4px 10px;
      border-radius: 100px;
      letter-spacing: 0.05em;
    }

    .content {
      position: relative;
      z-index: 2;
      height: calc(100% - 84px);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .terminal {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: var(--cyan);
      text-align: left;
      width: 420px;
      opacity: 0;
      transition: opacity .25s ease;
    }

    .terminal.show {
      opacity: 1;
    }

    .terminal .line {
      margin-bottom: 6px;
      color: rgba(244, 248, 252, 0.65);
    }

    .terminal .line b {
      color: var(--yellow);
      font-weight: 500;
    }

    .cursor {
      display: inline-block;
      width: 7px;
      height: 14px;
      background: var(--cyan);
      margin-left: 2px;
      animation: blink 0.9s steps(1) infinite;
      vertical-align: middle;
    }

    @keyframes blink {
      50% {
        opacity: 0;
      }
    }

    /* ================= main row: ID card + info panel ================= */
    .main-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 90px;
      width: 100%;
      padding: 0 70px;
    }

    /* ID Card — ukuran fisik B7 (8.8 x 12.5 cm), diperbesar ~1.25x untuk kanvas landscape 1280x720 */
    .idcard-wrap {
      flex-shrink: 0;
      perspective: 1000px;
    }

    .idcard {
      position: relative;
      width: 416px;
      height: 590px;
      border-radius: 20px;
      overflow: hidden;
      background: linear-gradient(160deg, var(--blue), var(--blue-deep) 70%);
      box-shadow: 0 30px 70px -18px rgba(0, 0, 0, 0.65), 0 0 0 1px rgba(79, 195, 247, 0.4), 0 0 40px rgba(22, 102, 194, 0.35);
      opacity: 0;
      transform: translateX(-360px) rotate(-26deg) scale(0.82);
      transition: transform .9s cubic-bezier(.16, 1, .3, 1), opacity .5s ease;
    }

    .idcard.reveal {
      opacity: 1;
      transform: translateX(0) rotate(0deg) scale(1);
    }

    .idcard-photo {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity .4s ease;
    }

    .idcard-photo.show {
      opacity: 1;
    }

    .idcard-initials {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Sora', sans-serif;
      font-weight: 800;
      font-size: 118px;
      color: rgba(244, 248, 252, 0.9);
      letter-spacing: 0.02em;
      background:
        radial-gradient(circle at 30% 25%, rgba(79, 195, 247, 0.25), transparent 55%),
        linear-gradient(160deg, var(--blue), var(--blue-deep) 75%);
    }

    .idcard-shine {
      position: absolute;
      top: 0;
      bottom: 0;
      left: -60%;
      width: 40%;
      background: linear-gradient(75deg, transparent, rgba(255, 255, 255, 0.16), transparent);
      transform: skewX(-18deg);
      animation: sweep 4.5s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes sweep {
      0% {
        left: -60%;
      }

      35% {
        left: 130%;
      }

      100% {
        left: 130%;
      }
    }

    .idcard-topstripe {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 10px;
      background: linear-gradient(90deg, var(--cyan), var(--yellow));
    }

    .idcard-footer {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 10px 14px 12px;
      background: linear-gradient(0deg, rgba(5, 7, 12, 0.88), rgba(5, 7, 12, 0));
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .idcard-footer .barcode {
      display: flex;
      align-items: flex-end;
      gap: 2px;
      height: 16px;
    }

    .idcard-footer .barcode i {
      display: block;
      width: 2px;
      background: rgba(244, 248, 252, 0.55);
    }

    .idcard-footer .size-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9.5px;
      letter-spacing: 0.06em;
      color: rgba(244, 248, 252, 0.55);
      text-align: right;
      line-height: 1.3;
    }

    .idcard-footer .size-label b {
      color: var(--yellow);
      font-weight: 600;
    }

    /* ---- info panel di samping kartu ---- */
    .info-block {
      text-align: left;
      max-width: 420px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--black);
      background: linear-gradient(100deg, var(--yellow), #ffe27a);
      padding: 9px 20px;
      border-radius: 100px;
      margin-bottom: 22px;
      text-transform: uppercase;
      box-shadow: 0 6px 18px -6px rgba(255, 210, 63, 0.6);
      opacity: 0;
      transform: translateX(24px);
      transition: opacity .5s ease, transform .5s cubic-bezier(.2, .8, .2, 1);
    }

    .badge.show {
      opacity: 1;
      transform: translateX(0);
    }

    .name {
      font-family: 'Sora', sans-serif;
      font-weight: 800;
      font-size: 46px;
      line-height: 1.16;
      color: var(--white);
      margin-bottom: 26px;
      letter-spacing: -0.01em;
      min-height: 1.3em;
    }

    .type-cursor {
      display: inline-block;
      width: 3px;
      height: 0.85em;
      background: var(--cyan);
      margin-left: 3px;
      vertical-align: -0.1em;
      animation: blink 0.85s steps(1) infinite;
    }

    .type-cursor.done {
      opacity: 0;
    }

    .nim-chip {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 17px;
      color: var(--cyan);
      background: rgba(79, 195, 247, 0.08);
      border: 1px solid rgba(79, 195, 247, 0.3);
      padding: 12px 22px;
      border-radius: 10px;
      letter-spacing: 0.04em;
      opacity: 0;
      transform: translateX(24px);
      transition: opacity .5s ease, transform .5s cubic-bezier(.2, .8, .2, 1);
    }

    .nim-chip.show {
      opacity: 1;
      transform: translateX(0);
    }

    .nim-chip .lbl {
      color: rgba(244, 248, 252, 0.5);
      font-size: 12.5px;
    }

    .divider {
      width: 44px;
      height: 3px;
      background: var(--yellow);
      border-radius: 3px;
      margin: 26px 0;
      opacity: 0;
      transition: opacity .5s ease;
    }

    .divider.show {
      opacity: 1;
    }

    .footer-note {
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      color: rgba(244, 248, 252, 0.4);
      letter-spacing: 0.03em;
      opacity: 0;
      transition: opacity .5s ease;
    }

    .footer-note.show {
      opacity: 1;
    }

    .bottombar {
      position: absolute;
      bottom: 20px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      gap: 8px;
      z-index: 3;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(244, 248, 252, 0.25);
      transition: all .3s ease;
      cursor: pointer;
    }

    .dot.active {
      background: var(--yellow);
      width: 22px;
      border-radius: 5px;
    }

    .navzone {
      position: absolute;
      inset: 0;
      z-index: 4;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <div class="stage" id="stage">
    <div class="binary-rain" id="rain"></div>

    <div class="topbar">
      <div class="org-mark">
        <div class="glyph">TI</div>
        <div class="txt">HMIF<span>HIMPUNAN MAHASISWA TEKNIK INFORMATIKA</span></div>
      </div>
      <div class="index-tag" id="indexTag">01 / 01</div>
    </div>

    <div class="content">
      <div class="terminal" id="terminal">
        <div class="line">$ init <b>id_card_anggota.sh</b></div>
        <div class="line">rendering kartu HMIF ...</div>
        <div class="line">compiling data organisasi<span class="cursor"></span></div>
      </div>

      <div class="main-row" id="mainRow">
        <div class="idcard-wrap">
          <div class="idcard" id="idcard">
            <div class="idcard-topstripe"></div>
            <div class="idcard-initials" id="cardInitials">NC</div>
            <img class="idcard-photo" id="cardPhoto" src="" alt="">
            <div class="idcard-shine"></div>
            <div class="idcard-footer">
              <div class="barcode" id="barcode"></div>
              <div class="size-label">ID-CARD // TIF<br><b>Pengurus</b> · HMIF</div>
            </div>
          </div>
        </div>

        <div class="info-block">
          <div class="badge" id="position">JABATAN</div>
          <div class="name" id="name"><span id="nameText"></span><span class="type-cursor" id="typeCursor"></span></div>
          <div class="nim-chip" id="nimChip"><span class="lbl">NIM</span>&nbsp;<span id="nim">000000000</span></div>
          <div class="divider" id="divider"></div>
          <div class="footer-note" id="footerNote">Himpunan Mahasiswa Teknik Informatika</div>
        </div>
      </div>
    </div>

    <div class="bottombar" id="dots"></div>
    <div class="navzone" onclick="nextMember()"></div>
  </div>

  <script>
    // ==== DATA ANGGOTA — edit / tambah data di sini ====
    // isi "foto" dengan nama file/URL foto (contoh: "foto/nabila.jpg" atau link gambar).
    // kalau dikosongkan (""), otomatis pakai inisial nama sebagai placeholder foto di ID card.
    const members = [
      { nama: "Nabila Chandra Annantava", jabatan: "Ketua Organisasi", nim: "251451011", foto: "" },
      { nama: "Ralita Enden Jala Reswari", jabatan: "Wakil Ketua Organisasi", nim: "251451007", foto: "Ralita-0002.jpg" },
      { nama: "M. Rizky Nurwahyudi", jabatan: "Kepala Divisi MEDINFO", nim: "251451012", foto: "Rizkynur-0001.png" },
      { nama: "nama anggota", jabatan: "Kepala Divisi ", nim: "2514510", foto: "nama anggota-0001.png" },
      { nama: "nama anggota", jabatan: "Kepala Divisi ", nim: "2514510", foto: "nama anggota-0001.png" },
      { nama: "nama anggota", jabatan: "Kepala Divisi ", nim: "2514510", foto: "nama anggota-0001.png" },
      { nama: "nama anggota", jabatan: "Kepala Divisi ", nim: "2514510", foto: "nama anggota-0001.png" },
      { nama: "nama anggota", jabatan: "Kepala Divisi ", nim: "2514510", foto: "nama anggota-0001.png" },
      { nama: "nama anggota", jabatan: "Kepala Divisi ", nim: "2514510", foto: "nama anggota-0001.png" },
      { nama: "nama anggota", jabatan: "Kepala Divisi ", nim: "2514510", foto: "nama anggota-0001.png" },
      { nama: "nama anggota", jabatan: "Kepala Divisi ", nim: "2514510", foto: "nama anggota-0001.png" },
      { nama: "nama anggota", jabatan: "Kepala Divisi ", nim: "2514510", foto: "nama anggota-0001.png" },
    ];

    let idx = 0;
    let typeTimer = null;

    const terminal = document.getElementById('terminal');
    const idcard = document.getElementById('idcard');
    const rain = document.getElementById('rain');
    const dotsWrap = document.getElementById('dots');
    const indexTag = document.getElementById('indexTag');
    const badge = document.getElementById('position');
    const nimChip = document.getElementById('nimChip');
    const divider = document.getElementById('divider');
    const footerNote = document.getElementById('footerNote');

    function pad(n) { return n < 10 ? '0' + n : '' + n; }

    function getInitials(name) {
      const parts = name.trim().split(/\s+/);
      if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
      return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
    }

    function buildDots() {
      dotsWrap.innerHTML = '';
      members.forEach((_, i) => {
        const d = document.createElement('div');
        d.className = 'dot' + (i === idx ? ' active' : '');
        d.onclick = (e) => { e.stopPropagation(); goTo(i); };
        dotsWrap.appendChild(d);
      });
    }

    function fillBinaryRain() {
      let out = '';
      for (let i = 0; i < 26; i++) {
        let row = '';
        for (let j = 0; j < 26; j++) { row += Math.round(Math.random()); }
        out += row + '\n';
      }
      rain.textContent = out;
    }

    function buildBarcode() {
      const bc = document.getElementById('barcode');
      bc.innerHTML = '';
      for (let i = 0; i < 18; i++) {
        const bar = document.createElement('i');
        const h = 6 + Math.round(Math.random() * 10);
        bar.style.height = h + 'px';
        bc.appendChild(bar);
      }
    }

    function renderCard() {
      const m = members[idx];
      const photoEl = document.getElementById('cardPhoto');

      document.getElementById('cardInitials').textContent = getInitials(m.nama);
      badge.textContent = m.jabatan;
      document.getElementById('nim').textContent = m.nim;
      indexTag.textContent = pad(idx + 1) + ' / ' + pad(members.length);
      buildDots();
      buildBarcode();

      clearInterval(typeTimer);
      document.getElementById('nameText').textContent = '';
      document.getElementById('typeCursor').classList.remove('done');

      photoEl.classList.remove('show');
      if (m.foto) {
        photoEl.src = m.foto;
        photoEl.onerror = () => { photoEl.classList.remove('show'); photoEl.removeAttribute('src'); };
      } else {
        photoEl.removeAttribute('src');
      }
    }

    function typeWriter(text) {
      const el = document.getElementById('nameText');
      const cursor = document.getElementById('typeCursor');
      let i = 0;
      clearInterval(typeTimer);
      typeTimer = setInterval(() => {
        el.textContent = text.slice(0, i + 1);
        i++;
        if (i >= text.length) {
          clearInterval(typeTimer);
          cursor.classList.add('done');
        }
      }, 55);
    }

    function playSequence() {
      idcard.classList.remove('reveal');
      document.getElementById('cardPhoto').classList.remove('show');
      badge.classList.remove('show');
      nimChip.classList.remove('show');
      divider.classList.remove('show');
      footerNote.classList.remove('show');

      terminal.classList.add('show');
      fillBinaryRain();
      renderCard();

      setTimeout(() => {
        terminal.classList.remove('show');
        const m = members[idx];

        // ID card B7 slide + putar masuk
        idcard.classList.add('reveal');
        if (m.foto) {
          setTimeout(() => document.getElementById('cardPhoto').classList.add('show'), 250);
        }

        // jabatan & NIM muncul di samping kartu
        setTimeout(() => {
          badge.classList.add('show');
          nimChip.classList.add('show');
          divider.classList.add('show');
          footerNote.classList.add('show');
        }, 200);

        // nama anggota — animasi text berjalan (typewriter)
        setTimeout(() => typeWriter(m.nama), 380);
      }, 650);
    }

    function goTo(i) {
      idx = (i + members.length) % members.length;
      playSequence();
    }
    function nextMember() { goTo(idx + 1); }
    function prevMember() { goTo(idx - 1); }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight') nextMember();
      if (e.key === 'ArrowLeft') prevMember();
    });

    // init
    playSequence();
  </script>

</body>

</html>
